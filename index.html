<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="a premium yachtjet landing page for luxury yacht rentals featuring a sleek dark design and an integrated booking form"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>A premium "YachtJet"</title>
  </head>
  <body>
    <header>
      <div class="header-container container">
        <a href="/" class="logo-header">yachtjet</a>
        <nav class="page-nav-header">
          <ul class="nav-list-header">
            <li class="nav-list-item-header nav-list-item-header-active">
              <a href="#" class="nav-link-header">About</a>
            </li>
            <li class="nav-list-item-header">
              <a href="#" class="nav-link-header">Yachts</a>
            </li>
            <li class="nav-list-item-header">
              <a href="#" class="nav-link-header">Reviews</a>
            </li>
          </ul>
        </nav>
        <div class="header-social-container">
          <ul class="header-social-list">
            <li class="header-social-item">
              <a href="#" class="header-social-link">
                <svg width="24" height="24" class="header-social-icon">
                  <use href="/img/icons.svg#icon-youtube"></use>
                </svg>
              </a>
            </li>
            <li class="header-social-item">
              <a href="#" class="header-social-link">
                <svg width="24" height="24" class="header-social-icon">
                  <use href="/img/icons.svg#icon-instagram"></use>
                </svg>
              </a>
            </li>
            <li class="header-social-item">
              <a href="#" class="header-social-link">
                <svg width="24" height="24" class="header-social-icon">
                  <use href="/img/icons.svg#icon-facebook"></use>
                </svg>
              </a>
            </li>
          </ul>
        </div>
        <button class="burger-menu-btn-open" type="button">
          <svg width="28" height="28" class="burger-menu-icon-open">
            <use href="/img/icons.svg#icon-burger-menu"></use>
          </svg>
        </button>
      </div>
    </header>
    <main>
      <section>
        <div class="container"></div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
